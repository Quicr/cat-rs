<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <defs>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
  </defs>

  <!-- Border -->
  <rect x="2" y="2" width="236" height="96" rx="16" fill="none" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Token chip shape -->
  <rect x="10" y="15" width="70" height="70" rx="12" fill="url(#tokenGrad)"/>

  <!-- Chip circuit lines -->
  <rect x="20" y="38" width="20" height="24" rx="3" fill="#1E1B4B" opacity="0.6"/>
  <line x1="40" y1="45" x2="52" y2="45" stroke="#A5B4FC" stroke-width="2"/>
  <line x1="40" y1="50" x2="55" y2="50" stroke="#A5B4FC" stroke-width="2"/>
  <line x1="40" y1="55" x2="52" y2="55" stroke="#A5B4FC" stroke-width="2"/>

  <!-- Play triangle on chip -->
  <path d="M56 40 L56 60 L70 50 Z" fill="#10B981"/>

  <!-- Lock/key icon small -->
  <circle cx="30" cy="28" r="5" fill="none" stroke="#FCD34D" stroke-width="2"/>
  <rect x="27" y="32" width="6" height="8" rx="1" fill="#FCD34D"/>

  <!-- CAT text -->
  <text x="95" y="52"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="36"
        font-weight="800"
        fill="#1E293B">CAT</text>

  <!-- for MOQ subtitle -->
  <text x="95" y="75"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="18"
        font-weight="600"
        fill="#10B981">for MOQ</text>
</svg>
